# Application
spring.application.name=event-transport
server.port=8080
spring.profiles.active=seed
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# H2 Database (dev profile - default)
spring.datasource.url=jdbc:h2:mem:dispatchdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# VAPID Web Push Configuration
vapid.public-key=${VAPID_PUBLIC_KEY:}
vapid.private-key=${VAPID_PRIVATE_KEY:}
vapid.subject=${VAPID_SUBJECT:mailto:support@event-transport.com}

# Admin contact — change ADMIN_PHONE in backend/.env to your real number
app.admin-phone=${ADMIN_PHONE:+91-9900000000}

# Authentication
app.auth.jwt-secret=${JWT_SECRET:dev-jwt-secret-change-me}
app.auth.jwt-expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.auth.admin.username=${ADMIN_USERNAME:admin}
app.auth.admin.password=${ADMIN_PASSWORD:admin123}
app.auth.admin.phone=${ADMIN_PHONE:9900000000}
app.auth.admin.name=${ADMIN_NAME:Event Admin}

# Scheduling
spring.task.scheduling.pool.size=10
spring.task.scheduling.thread-name-prefix=dispatch-scheduler-

# Event image uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.events-dir=uploads/events
app.upload.events-max-bytes=5242880
app.events.default-image-url=/images/default-event.svg
