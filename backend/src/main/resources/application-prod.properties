# PostgreSQL (production)
# DATABASE_URL is parsed by DataSourceConfig (supports postgres:// and jdbc:postgresql://)
server.port=${PORT:8080}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Disable H2 console in production
spring.h2.console.enabled=false

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Event image uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.events-dir=uploads/events
app.upload.events-max-bytes=5242880
app.events.default-image-url=/images/default-event.svg

app.auth.jwt-secret=${JWT_SECRET}
app.auth.jwt-expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.auth.admin.username=${ADMIN_USERNAME}
app.auth.admin.password=${ADMIN_PASSWORD}
app.auth.admin.phone=${ADMIN_PHONE:9900000000}
app.auth.admin.name=${ADMIN_NAME:Event Admin}

# VAPID Web Push Configuration
vapid.public-key=${VAPID_PUBLIC_KEY}
vapid.private-key=${VAPID_PRIVATE_KEY}
vapid.subject=${VAPID_SUBJECT:mailto:support@event-transport.com}

