# Application
spring.application.name=event-transport
server.port=8080

# H2 Database (dev profile - default)
spring.datasource.url=jdbc:h2:mem:dispatchdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# VAPID Web Push Configuration
vapid.public-key=${VAPID_PUBLIC_KEY:}
vapid.private-key=${VAPID_PRIVATE_KEY:}
vapid.subject=${VAPID_SUBJECT:mailto:support@event-transport.com}

# Admin contact — change ADMIN_PHONE in backend/.env to your real number
app.admin-phone=${ADMIN_PHONE:+91-9900000000}

# Scheduling
spring.task.scheduling.pool.size=10
spring.task.scheduling.thread-name-prefix=dispatch-scheduler-

# Event image uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.events-dir=uploads/events
app.upload.events-max-bytes=5242880
app.events.default-image-url=/images/default-event.svg

# Lightweight role access keys (override in env for non-dev use)
app.auth.admin-key=${ADMIN_ACCESS_KEY:dev-admin-key}
app.auth.driver-key=${DRIVER_ACCESS_KEY:dev-driver-key}
app.auth.guest-key=${GUEST_ACCESS_KEY:dev-guest-key}

