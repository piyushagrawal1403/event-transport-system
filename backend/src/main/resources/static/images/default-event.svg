<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Event Image Placeholder</title>
  <desc id="desc">Default image shown when no event banner is uploaded.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="700" fill="url(#bg)"/>
  <g fill="none" stroke="#6b7280" stroke-width="2" opacity="0.4">
    <circle cx="200" cy="150" r="90"/>
    <circle cx="980" cy="520" r="130"/>
    <path d="M0 580 L1200 280"/>
  </g>
  <g transform="translate(600 350)">
    <rect x="-180" y="-85" width="360" height="170" rx="18" fill="#374151" stroke="#9ca3af"/>
    <text x="0" y="-12" font-family="Arial, sans-serif" font-size="44" fill="#f9fafb" text-anchor="middle">Event Banner</text>
    <text x="0" y="30" font-family="Arial, sans-serif" font-size="24" fill="#d1d5db" text-anchor="middle">Upload an image from Admin Dashboard</text>
  </g>
</svg>

