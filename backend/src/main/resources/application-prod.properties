# PostgreSQL (production)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/dispatchdb}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:dispatch}
spring.datasource.password=${DB_PASSWORD:dispatch}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Disable H2 console in production
spring.h2.console.enabled=false

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Event image uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.events-dir=uploads/events
app.upload.events-max-bytes=5242880
app.events.default-image-url=/images/default-event.svg

app.auth.admin-key=${ADMIN_ACCESS_KEY:change-me-admin}
app.auth.driver-key=${DRIVER_ACCESS_KEY:change-me-driver}
app.auth.guest-key=${GUEST_ACCESS_KEY:change-me-guest}

