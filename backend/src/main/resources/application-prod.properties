# PostgreSQL (production)
# DATABASE_URL is parsed by DataSourceConfig (supports postgres:// and jdbc:postgresql://)
server.port=${PORT:8080}
spring.datasource.driverClassName=org.postgresql.Driver
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Disable H2 console in production
spring.h2.console.enabled=false

# Actuator — only expose health for Render health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Constrain thread usage for smaller Railway containers
server.tomcat.threads.max=${SERVER_TOMCAT_THREADS_MAX:32}
server.tomcat.threads.min-spare=${SERVER_TOMCAT_THREADS_MIN_SPARE:4}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Keep scheduled background work lightweight in production
spring.task.scheduling.pool.size=${SPRING_TASK_SCHEDULING_POOL_SIZE:2}

# Event image uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
app.upload.events-dir=uploads/events
app.upload.events-max-bytes=5242880
app.events.default-image-url=/images/default-event.svg

# Cloudinary – required in prod to persist images across redeployments
cloudinary.url=${CLOUDINARY_URL}

app.auth.jwt-secret=${JWT_SECRET}
app.auth.jwt-expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.auth.admin.username=${ADMIN_USERNAME}
app.auth.admin.password=${ADMIN_PASSWORD}
app.auth.admin.phone=${ADMIN_PHONE:9900000000}
app.auth.admin.name=${ADMIN_NAME:Event Admin}

# VAPID Web Push Configuration
vapid.public-key=${VAPID_PUBLIC_KEY}
vapid.private-key=${VAPID_PRIVATE_KEY}
vapid.subject=${VAPID_SUBJECT:mailto:support@event-transport.com}

# Logging (production): keep application activity visible, reduce framework noise
logging.level.root=WARN
logging.level.com.dispatch=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN

